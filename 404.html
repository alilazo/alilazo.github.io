<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Amado Lazo</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        :root {
            --bg: #f7f5f0;
            --text: #171717;
            --accent: #e63946;
            --panel: #ffffff;
            --border: #171717;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        main {
            max-width: 640px;
            padding: 32px;
            background: var(--panel);
            border: 3px solid var(--border);
            box-shadow: 8px 8px 0 0 var(--border);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: clamp(2.4rem, 7vw, 4rem);
            text-transform: uppercase;
        }

        p {
            line-height: 1.6;
        }

        a {
            color: var(--accent);
            font-weight: 700;
        }
    </style>
    <script>
        (function () {
            function safeDecode(value) {
                try {
                    return decodeURIComponent(value);
                } catch (error) {
                    return value;
                }
            }

            var marker = '/qrgenerator/';
            var path = window.location.pathname;
            var index = path.toLowerCase().indexOf(marker);

            if (index === -1) {
                return;
            }

            var suffix = path.slice(index + marker.length).replace(/^\/+|\/+$/g, '');
            var looksLikeFile = /\.[a-z0-9]+$/i.test(suffix);

            if (!suffix || looksLikeFile) {
                return;
            }

            var params = new URLSearchParams(window.location.search);

            if (!params.has('text')) {
                params.set('text', safeDecode(suffix));
            }

            var query = params.toString();
            var target = window.location.origin + path.slice(0, index) + marker + (query ? '?' + query : '');
            window.location.replace(target);
        }());
    </script>
</head>

<body>
    <main>
        <h1>404</h1>
        <p>The page you requested could not be found.</p>
        <p><a href="/">Go back home</a></p>
    </main>
</body>

</html>
